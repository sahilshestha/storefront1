{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Login Form -->
        <form class="login-form" id="login-form" novalidate>

          <div class="form-group" id="group-email">
            <label class="form-label" for="email">Email address</label>
            <div class="form-input-wrap">
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="your@email.com"
                autocomplete="email"
              />
              <span class="form-input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
            </div>
            <p class="form-error" id="error-email"></p>
          </div>

          <div class="form-group" id="group-password">
            <div class="form-label-row">
              <label class="form-label" for="password">Password</label>
              <a href="forgot.html" class="login-link login-link--small">Forgot password?</a>
            </div>
            <div class="form-input-wrap">
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="form-input-icon form-input-icon--btn"
                id="toggle-password"
                aria-label="Toggle password visibility"
              >
                <svg class="eye-icon eye-icon--show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-icon eye-icon--hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <p class="form-error" id="error-password"></p>
          </div>

          <!-- Remember me -->
          <div class="form-check">
            <label class="checkbox-label">
              <input type="checkbox" class="checkbox-input" id="remember" name="remember" />
              <span class="checkbox-custom"></span>
              Keep me signed in
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-submit" id="submit-btn">
            <span class="btn-submit__text">Sign In</span>
            <span class="btn-submit__loader" aria-hidden="true"></span>
          </button>

        </form>


{% endblock %}
