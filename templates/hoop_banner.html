{% load static %}

<!-- ══════════════════════════════════════════════════════════
     BANNER / PROMO SECTION
══════════════════════════════════════════════════════════ -->

<section class="banner section-pad" id="banner">

  <div class="container">

    <div class="banner__inner">

      <div class="banner__tag">
        Limited Time Deal
      </div>

      <h2 class="banner__title">
        End of Season <br>
        <em>Clearance Sale</em>
      </h2>

      <p class="banner__desc">
        Up to 40% off select shoes, jerseys, and training gear. Stock is limited — grab your size before it's gone.
      </p>

      <!-- COUNTDOWN -->
      <div class="banner__countdown">

        <div class="countdown-unit">
          <div class="countdown-unit__num" id="cd-hours">08</div>
          <div class="countdown-unit__label">Hours</div>
        </div>

        <div class="countdown-unit">
          <div class="countdown-unit__num" id="cd-minutes">45</div>
          <div class="countdown-unit__label">Minutes</div>
        </div>

        <div class="countdown-unit">
          <div class="countdown-unit__num" id="cd-seconds">00</div>
          <div class="countdown-unit__label">Seconds</div>
        </div>

      </div>

      <a href="#products" class="btn">
        Shop the Sale →
      </a>

    </div>

  </div>

</section>
