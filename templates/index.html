<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Home</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="container header__content">

        <div class="logo">ShopEase</div>

        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Categories</a>
            <a href="#">Contact</a>
        </nav>

        <div class="header__actions">
            <button class="icon-btn">🛒 <span id="cartCount">0</span></button>
        </div>

    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="container hero__content">
        <h1>Premium Shopping Experience</h1>
        <p>Discover high-quality products at the best prices</p>
        <button class="btn-primary" onclick="goToShop()">Start Shopping</button>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">
    <div class="container">

        <h2 class="section-title">Featured Products</h2>

        <div class="grid">

            <div class="card">
                <img src="https://via.placeholder.com/300" alt="Product">
                <div class="card__body">
                    <h3>Smartphone Pro</h3>
                    <p class="price">$499</p>
                    <button class="btn-secondary add-to-cart">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300" alt="Product">
                <div class="card__body">
                    <h3>Gaming Laptop</h3>
                    <p class="price">$1199</p>
                    <button class="btn-secondary add-to-cart">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300" alt="Product">
                <div class="card__body">
                    <h3>Wireless Headphones</h3>
                    <p class="price">$199</p>
                    <button class="btn-secondary add-to-cart">Add to Cart</button>
                </div>
            </div>

        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <p>© 2026 ShopEase. Built with Django.</p>
    </div>
</footer>

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
